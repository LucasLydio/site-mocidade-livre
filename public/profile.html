<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Perfil • Mocidade Livre</title>
    <meta name="description" content="Seu perfil na Mocidade Livre." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/pages/profile.css" />
    <link rel="icon" href="assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="profile">
    <div data-include="components/layout/header.html"></div>

    <main class="container py-5">
      <section class="profile-card p-4 p-md-5 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Meu perfil</h1>
            <p class="text-secondary mb-0">Veja e atualize suas informações básicas.</p>
          </div>
          <button class="btn btn-outline-secondary btn-sm" id="logout-btn" type="button">
            <i class="bi bi-box-arrow-right me-2" aria-hidden="true"></i>Sair
          </button>
        </div>

        <div class="alert d-none" id="profile-alert" role="alert"></div>

        <div class="text-secondary small" id="profile-loading">Carregando...</div>

        <form class="d-none" id="profile-form" novalidate>
          <div class="row g-3">
            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-name">Nome</label>
              <input class="form-control bg-transparent text-body" id="profile-name" name="name" type="text" required />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-telephone">Telefone</label>
              <input class="form-control bg-transparent text-body" id="profile-telephone" name="telephone" type="tel" />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-email">Email</label>
              <input class="form-control bg-transparent text-body" id="profile-email" name="email" type="email" disabled />
            </div>

            <div class="col-12 col-md-6">
              <label class="form-label" for="profile-role">Perfil</label>
              <input class="form-control bg-transparent text-body" id="profile-role" name="role" type="text" disabled />
            </div>
          </div>

          <div class="d-flex flex-column flex-sm-row gap-2 justify-content-end mt-4">
            <button class="btn btn-dark" type="submit">
              <i class="bi bi-check2 me-2" aria-hidden="true"></i>Salvar
            </button>
          </div>
        </form>
      </section>
    </main>

    <div data-include="components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/components/include.js"></script>
    <script type="module" src="assets/js/pages/profile.js"></script>
  </body>
</html>
