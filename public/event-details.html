<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Evento • Mocidade Livre</title>
    <meta name="description" content="Detalhes do evento da Mocidade Livre." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="assets/css/main.css" />
    <link rel="stylesheet" href="assets/css/pages/events.css" />
    <link rel="icon" href="assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body>
    <div data-include="components/layout/header.html"></div>

    <main class="container py-5">
      <a class="btn btn-outline-secondary btn-sm mb-3" href="events.html">
        <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>Voltar para eventos
      </a>

      <div class="alert d-none" id="event-alert" role="alert"></div>
      <div class="text-secondary small" data-event-loading>Carregando...</div>

      <article class="d-none" data-event-content>
        <div class="ratio ratio-16x9 rounded-4 overflow-hidden border" style="border-color: var(--border)">
          <img id="event-cover" class="w-100 h-100 object-fit-cover" alt="" />
        </div>

        <header class="mt-4">
          <h1 class="h3 mb-2" data-event-title></h1>
          <p class="text-secondary mb-0" data-event-summary></p>
        </header>

        <section class="mt-4 p-4 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
          <div class="d-flex flex-column gap-2">
            <div class="d-flex gap-2 align-items-start">
              <i class="bi bi-clock text-secondary" aria-hidden="true"></i>
              <div data-event-datetime></div>
            </div>
            <div class="d-flex gap-2 align-items-start d-none" data-event-location-row>
              <i class="bi bi-geo-alt text-secondary" aria-hidden="true"></i>
              <div>
                <div data-event-location></div>
                <div class="text-secondary small" data-event-address></div>
              </div>
            </div>
          </div>
        </section>

        <section class="mt-4">
          <h2 class="h5 mb-2">Descrição</h2>
          <div class="text-body" data-event-description style="white-space: pre-wrap"></div>
        </section>
      </article>
    </main>

    <div data-include="components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="assets/js/components/include.js"></script>
    <script type="module" src="assets/js/pages/event-details.js"></script>
  </body>
</html>
