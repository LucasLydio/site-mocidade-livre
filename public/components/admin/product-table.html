<section class="p-4 rounded-4 border h-100" style="background: var(--surface); border-color: var(--border)">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="fw-semibold">Produtos</div>
      <div class="text-secondary small">Lista e edição</div>
    </div>
    <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-refresh>
      <i class="bi bi-arrow-clockwise me-2" aria-hidden="true"></i>Atualizar
    </button>
  </div>

  <div class="text-secondary small d-none" data-admin-loading>Carregando...</div>
  <div class="text-secondary small d-none" data-admin-empty>Nenhum produto cadastrado.</div>

  <div class="table-responsive d-none d-md-block">
    <table class="table align-middle mb-0">
      <thead>
        <tr>
          <th>Produto</th>
          <th>Preço</th>
          <th>Estoque</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody data-admin-product-rows></tbody>
    </table>
  </div>

  <div class="d-md-none d-flex flex-column gap-2" data-admin-product-cards></div>
</section>
