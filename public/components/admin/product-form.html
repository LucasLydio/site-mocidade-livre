<section class="p-4 rounded-4 border h-100" style="background: var(--surface); border-color: var(--border)">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <div>
      <div class="fw-semibold">Produto</div>
      <div class="text-secondary small">Criar ou editar</div>
    </div>
    <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-clear-form>
      Limpar
    </button>
  </div>

  <form id="admin-product-form" novalidate>
    <input type="hidden" name="id" />

    <div class="mb-3">
      <label class="form-label" for="admin-category">Categoria</label>
      <select class="form-select bg-transparent text-body" id="admin-category" name="category_id">
        <option value="">Sem categoria</option>
      </select>
      <div class="text-secondary small mt-2">
        <button class="btn btn-link px-0 py-0" type="button" data-admin-new-category>+ Nova categoria</button>
      </div>
    </div>

    <div class="mb-3 d-none" data-admin-category-form>
      <div class="p-3 rounded-4 border" style="border-color: var(--border)">
        <div class="fw-semibold mb-2">Nova categoria</div>
        <div class="row g-2">
          <div class="col-12">
            <label class="form-label" for="admin-cat-name">Nome</label>
            <input class="form-control bg-transparent text-body" id="admin-cat-name" name="cat_name" type="text" />
          </div>
          <div class="col-12">
            <label class="form-label" for="admin-cat-slug">Slug</label>
            <input class="form-control bg-transparent text-body" id="admin-cat-slug" name="cat_slug" type="text" placeholder="camisetas" />
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-dark btn-sm" type="button" data-admin-create-category>Criar</button>
            <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-cancel-category>Cancelar</button>
          </div>
        </div>
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="admin-name">Nome</label>
      <input class="form-control bg-transparent text-body" id="admin-name" name="name" type="text" required />
    </div>

    <div class="mb-3">
      <label class="form-label" for="admin-slug">Slug</label>
      <input class="form-control bg-transparent text-body" id="admin-slug" name="slug" type="text" required />
      <div class="text-secondary small mt-1">Use letras minúsculas, números e hífen. Ex: <code>camiseta-preta</code></div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="admin-description">Descrição</label>
      <textarea class="form-control bg-transparent text-body" id="admin-description" name="description" rows="3"></textarea>
    </div>

    <div class="row g-3">
      <div class="col-6">
        <label class="form-label" for="admin-price">Preço (R$)</label>
        <input class="form-control bg-transparent text-body" id="admin-price" name="price_brl" type="text" inputmode="decimal" placeholder="25,00" required />
      </div>
      <div class="col-6">
        <label class="form-label" for="admin-stock">Estoque</label>
        <input class="form-control bg-transparent text-body" id="admin-stock" name="stock_qty" type="number" min="0" step="1" value="0" required />
      </div>
    </div>

    <div class="form-check mt-3">
      <input class="form-check-input" id="admin-active" name="is_active" type="checkbox" checked />
      <label class="form-check-label" for="admin-active">Ativo</label>
    </div>

    <div class="d-flex gap-2 mt-4">
      <button class="btn btn-dark flex-grow-1" type="submit">
        <i class="bi bi-save me-2" aria-hidden="true"></i>Salvar
      </button>
      <button class="btn btn-outline-danger" type="button" data-admin-delete-product disabled>
        <i class="bi bi-trash me-2" aria-hidden="true"></i>Excluir
      </button>
    </div>
  </form>

  <hr class="my-4" />

  <section>
    <div class="fw-semibold mb-2">Imagens</div>
    <div class="text-secondary small mb-3">Envie imagens pelo seletor abaixo (não cole URLs manualmente).</div>

    <div class="row g-2 align-items-end">
      <div class="col-12">
        <label class="form-label" for="admin-image-file">Arquivo</label>
        <input class="form-control bg-transparent text-body" id="admin-image-file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" />
      </div>
      <div class="col-12 col-sm-6">
        <label class="form-label" for="admin-image-alt">Alt (opcional)</label>
        <input class="form-control bg-transparent text-body" id="admin-image-alt" type="text" placeholder="Camiseta preta" />
      </div>
      <div class="col-12 col-sm-6">
        <div class="form-check mt-2">
          <input class="form-check-input" id="admin-image-cover" type="checkbox" />
          <label class="form-check-label" for="admin-image-cover">Definir como capa</label>
        </div>
      </div>
      <div class="col-12">
        <button class="btn btn-outline-secondary w-100" type="button" data-admin-upload-image disabled>
          <i class="bi bi-upload me-2" aria-hidden="true"></i>Enviar imagem
        </button>
      </div>
    </div>

    <div class="mt-3 d-flex flex-column gap-2" data-admin-images></div>
  </section>
</section>
