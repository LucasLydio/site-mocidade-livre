<template id="event-card-template">
  <div class="col-12 col-md-6 col-lg-4">
    <a
      class="event-card d-block p-3 rounded-4 border h-100 text-decoration-none"
      style="border-color: var(--border)"
      data-event-link
      href="event-details.html"
    >
      <div class="ratio ratio-16x9 rounded-4 overflow-hidden border" style="border-color: var(--border)">
        <img data-event-cover class="w-100 h-100 object-fit-cover" alt="" loading="lazy" />
      </div>

      <div class="mt-3 d-flex justify-content-between align-items-start gap-2">
        <div class="fw-semibold" data-event-title></div>
        <span class="badge" data-event-badge></span>
      </div>

      <div class="text-secondary small mt-1 event-summary" data-event-summary></div>

      <div class="small mt-3 d-flex flex-column gap-1">
        <div class="d-flex gap-2 align-items-start">
          <i class="bi bi-clock text-secondary" aria-hidden="true"></i>
          <div class="text-body" data-event-datetime></div>
        </div>
        <div class="d-flex gap-2 align-items-start" data-event-location-row>
          <i class="bi bi-geo-alt text-secondary" aria-hidden="true"></i>
          <div class="text-body">
            <div data-event-location></div>
            <div class="text-secondary small" data-event-address></div>
          </div>
        </div>
      </div>

      <div class="mt-3">
        <span class="btn btn-dark btn-sm">Ver detalhes</span>
      </div>
    </a>
  </div>
</template>
