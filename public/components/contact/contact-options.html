<section class="contact-options mb-4">
  <div class="row g-3">
    <div class="col-12 col-md-6">
      <a
        class="contact-option d-flex gap-3 align-items-start p-4 rounded-4 border text-decoration-none h-100"
        style="border-color: var(--border)"
        data-contact-whatsapp
        href="#"
        target="_blank"
        rel="noopener"
      >
        <i class="bi bi-whatsapp fs-4" aria-hidden="true"></i>
        <div>
          <div class="fw-semibold">WhatsApp</div>
          <div class="text-secondary small">Clique para conversar com a equipe.</div>
        </div>
      </a>
    </div>
    <div class="col-12 col-md-6">
      <a
        class="contact-option d-flex gap-3 align-items-start p-4 rounded-4 border text-decoration-none h-100"
        style="border-color: var(--border)"
        data-contact-email
        href="#"
      >
        <i class="bi bi-envelope fs-4" aria-hidden="true"></i>
        <div>
          <div class="fw-semibold">Email</div>
          <div class="text-secondary small">Prefere email? Sem problemas.</div>
        </div>
      </a>
    </div>
  </div>
</section>
