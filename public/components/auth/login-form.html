<div class="mx-auto" style="max-width: 440px">
  <div class="p-4 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
    <div class="d-flex align-items-center gap-3 mb-3">
      <a class="site-logo d-inline-flex align-items-center text-decoration-none bg-white overflow-hidden" href="./">
        <img src="assets/images/logo-mocidade.webp" alt="Mocidade Livre" width="44" height="44" />
      </a>
      <div>
        <div class="fw-semibold">Entrar</div>
        <div class="text-secondary small">Acesse sua conta</div>
      </div>
    </div>

    <form id="login-form" action="#" method="post">
      <div class="mb-3">
        <label class="form-label" for="login-email">Email</label>
        <input class="form-control bg-transparent text-body" id="login-email" name="email" type="email" required />
      </div>
      <div class="mb-3">
        <label class="form-label" for="login-password">Senha</label>
        <input class="form-control bg-transparent text-body" id="login-password" name="password" type="password" required />
      </div>
      <button class="btn btn-dark w-100" type="submit">Entrar</button>
    </form>

    <div class="text-secondary small mt-3">
      Ainda não tem conta? <a href="register.html">Criar conta</a>
    </div>
  </div>
</div>
