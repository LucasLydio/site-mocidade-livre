<template id="product-card-template">
  <div class="col-12 col-sm-6 col-lg-4">
    <div class="card h-100 product-card p-3 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
      <div class="ratio ratio-1x1 rounded-4 overflow-hidden border" style="border-color: var(--border)">
        <img data-product-image class="w-100 h-100 object-fit-cover" alt="" />
      </div>

      <div class="mt-3">
        <div class="d-flex align-items-start justify-content-between gap-2">
          <div class="fw-semibold" data-product-name></div>
          <span class="badge text-bg-secondary" data-product-stock></span>
        </div>
        <div class="text-secondary small mt-1 product-desc" data-product-description></div>
        <div class="d-flex align-items-center justify-content-between gap-2 mt-3">
          <div class="fw-semibold" data-product-price></div>
          <button class="btn btn-dark btn-sm" type="button" data-add-to-cart>
            <i class="bi bi-plus-lg me-2" aria-hidden="true"></i>Adicionar
          </button>
        </div>
      </div>
    </div>
  </div>
</template>
