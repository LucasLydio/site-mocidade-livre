<div data-cart-panel>
  <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
    <div class="offcanvas-header">
      <h2 class="h5 mb-0" id="cartOffcanvasLabel">Carrinho</h2>
      <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Fechar"></button>
    </div>

    <div class="offcanvas-body">
      <div class="alert d-none" data-cart-alert role="alert"></div>

      <div class="d-none" data-cart-auth-required>
        <p class="text-secondary mb-3">Para usar o carrinho e finalizar pelo WhatsApp, faça login.</p>
        <a class="btn btn-dark w-100" href="login.html?next=shop.html">
          <i class="bi bi-person me-2" aria-hidden="true"></i>Entrar
        </a>
      </div>

      <div data-cart-app>
        <div class="text-secondary small d-none" data-cart-empty>Seu carrinho está vazio.</div>

        <div class="d-flex flex-column gap-2" data-cart-items></div>

        <div class="mt-4 pt-3 border-top" style="border-color: var(--border)">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <div class="fw-semibold">Total</div>
            <div class="fw-semibold" data-cart-total>R$ 0,00</div>
          </div>

          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="cart-name">Nome</label>
              <input class="form-control bg-transparent text-body" id="cart-name" name="customer_name" type="text" required />
            </div>
            <div class="col-12">
              <label class="form-label" for="cart-whatsapp">WhatsApp</label>
              <input class="form-control bg-transparent text-body" id="cart-whatsapp" name="customer_whatsapp" type="tel" placeholder="+55 62 99999-9999" required />
            </div>
            <div class="col-12">
              <label class="form-label" for="cart-notes">Observações (opcional)</label>
              <textarea class="form-control bg-transparent text-body" id="cart-notes" name="notes" rows="3"></textarea>
            </div>
          </div>

          <button class="btn btn-dark w-100 mt-3" type="button" data-cart-checkout>
            <i class="bi bi-whatsapp me-2" aria-hidden="true"></i>Finalizar no WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
