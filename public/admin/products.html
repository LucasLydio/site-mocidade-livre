<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Produtos • Mocidade Livre</title>
    <meta name="description" content="Administração de produtos da loja." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/pages/admin-products.css" />
    <link rel="icon" href="../assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="admin-products">
    <div data-include="../components/layout/header.html"></div>

    <main class="container py-5">
      <section class="admin-shell p-4 p-md-5 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Admin • Produtos</h1>
            <p class="text-secondary mb-0">Gerencie produtos, categorias e imagens.</p>
          </div>
          <a class="btn btn-outline-secondary btn-sm" href="../shop.html">
            <i class="bi bi-arrow-left me-2" aria-hidden="true"></i>Voltar para loja
          </a>
        </div>

        <div class="alert d-none" id="admin-alert" role="alert"></div>

        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <div data-include="../components/admin/product-form.html"></div>
          </div>

          <div class="col-12 col-lg-7">
            <div data-include="../components/admin/product-table.html"></div>
          </div>
        </div>
      </section>
    </main>

    <div data-include="../components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/components/include.js"></script>
    <script type="module" src="../assets/js/pages/admin-products.js"></script>
  </body>
</html>
