<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Eventos • Mocidade Livre</title>
    <meta name="description" content="Administração de eventos." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/pages/admin.css" />
    <link rel="icon" href="../assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="admin admin-events">
    <div data-include="../components/layout/header.html"></div>

    <main class="py-5">
      <section class="admin-shell p-3 p-md-4 rounded-4 border" style="background: var(--surface)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Admin • Eventos</h1>
            <p class="text-secondary mb-0">Crie, publique e gerencie os eventos do grupo.</p>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" href="./index.html">
              <i class="bi bi-grid me-2" aria-hidden="true"></i>Admin
            </a>
            <a class="btn btn-outline-secondary btn-sm" href="../events.html">
              <i class="bi bi-eye me-2" aria-hidden="true"></i>Ver público
            </a>
          </div>
        </div>

        <div class="alert d-none" id="admin-alert" role="alert"></div>

        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <section class="p-4 rounded-4 border h-100" style="background: var(--bg); border-color: var(--border)">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                  <div class="fw-semibold">Evento</div>
                  <div class="text-secondary small">Criar ou editar</div>
                </div>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-clear>Limpar</button>
              </div>

              <form id="admin-event-form" novalidate>
                <input type="hidden" name="id" />

                <div class="mb-3">
                  <label class="form-label" for="event-title">Título</label>
                  <input class="form-control bg-transparent text-body" id="event-title" name="title" type="text" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="event-summary">Resumo (opcional)</label>
                  <textarea class="form-control bg-transparent text-body" id="event-summary" name="summary" rows="2"></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="event-description">Descrição (opcional)</label>
                  <textarea class="form-control bg-transparent text-body" id="event-description" name="description" rows="4"></textarea>
                </div>

                <div class="row g-3">
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="event-starts-at">Início</label>
                    <input class="form-control bg-transparent text-body" id="event-starts-at" name="starts_at" type="datetime-local" required />
                  </div>
                  <div class="col-12 col-md-6">
                    <label class="form-label" for="event-ends-at">Fim (opcional)</label>
                    <input class="form-control bg-transparent text-body" id="event-ends-at" name="ends_at" type="datetime-local" />
                  </div>
                </div>

                <div class="mt-3">
                  <label class="form-label" for="event-location-name">Local (opcional)</label>
                  <input class="form-control bg-transparent text-body" id="event-location-name" name="location_name" type="text" placeholder="Ex: Igreja, salão..." />
                </div>

                <div class="mt-3">
                  <label class="form-label" for="event-location-address">Endereço (opcional)</label>
                  <input class="form-control bg-transparent text-body" id="event-location-address" name="location_address" type="text" placeholder="Rua, número, bairro..." />
                </div>

                <div class="mt-3">
                  <label class="form-label" for="event-cover-url">URL manual (opcional)</label>
                  <input class="form-control bg-transparent text-body" id="event-cover-url" name="cover_image_url" type="url" placeholder="https://..." />
                  <div class="text-secondary small mt-1">Preferir upload abaixo. URL manual é fallback.</div>
                </div>

                <div class="form-check mt-3">
                  <input class="form-check-input" id="event-published" name="is_published" type="checkbox" />
                  <label class="form-check-label" for="event-published">Publicado</label>
                </div>

                <div class="d-flex gap-2 mt-4">
                  <button class="btn btn-dark flex-grow-1" type="submit">
                    <i class="bi bi-save me-2" aria-hidden="true"></i>Salvar
                  </button>
                  <button class="btn btn-outline-danger" type="button" data-admin-delete disabled>
                    <i class="bi bi-trash me-2" aria-hidden="true"></i>Excluir
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <section>
                <div class="fw-semibold mb-2">Capa do evento</div>
                <div class="ratio ratio-16x9 rounded-4 overflow-hidden border mb-3" style="border-color: var(--border)">
                  <img id="event-cover-preview" class="w-100 h-100 object-fit-cover" alt="Capa do evento" />
                </div>

                <label class="form-label" for="event-cover-file">Upload de imagem</label>
                <input
                  class="form-control bg-transparent text-body"
                  id="event-cover-file"
                  type="file"
                  accept="image/png,image/jpeg,image/webp,image/svg+xml"
                />
                <button class="btn btn-outline-secondary w-100 mt-2" type="button" data-admin-upload-cover disabled>
                  <i class="bi bi-upload me-2" aria-hidden="true"></i>Enviar capa
                </button>
                <div class="text-secondary small mt-2">Dica: salve o evento primeiro, depois envie a capa.</div>
              </section>
            </section>
          </div>

          <div class="col-12 col-lg-7">
            <section class="p-4 rounded-4 border h-100" style="background: var(--bg); border-color: var(--border)">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                <div>
                  <div class="fw-semibold">Eventos</div>
                  <div class="text-secondary small">Publicados e rascunhos</div>
                </div>
                <div class="d-flex gap-2">
                  <input
                    class="form-control form-control-sm bg-transparent text-body"
                    style="max-width: 220px"
                    type="search"
                    placeholder="Buscar..."
                    data-admin-search
                  />
                  <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-refresh>
                    <i class="bi bi-arrow-clockwise me-2" aria-hidden="true"></i>Atualizar
                  </button>
                </div>
              </div>

              <div class="text-secondary small d-none" data-admin-loading>Carregando...</div>
              <div class="text-secondary small d-none" data-admin-empty>Nenhum evento cadastrado.</div>

              <div class="d-flex flex-column gap-2" data-admin-events-cards></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <div data-include="../components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/components/include.js"></script>
    <script type="module" src="../assets/js/pages/admin/events.js"></script>
  </body>
</html>
