<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Interesses • Mocidade Livre</title>
    <meta name="description" content="Administração de interesses de contato." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/pages/admin.css" />
    <link rel="icon" href="../assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="admin admin-contact-interests">
    <div data-include="../components/layout/header.html"></div>

    <main class="py-5">
      <section class="admin-shell p-3 p-md-4 rounded-4 border" style="background: var(--surface)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Admin • Interesses</h1>
            <p class="text-secondary mb-0">Mensagens enviadas pelo formulário de contato.</p>
          </div>
          <a class="btn btn-outline-secondary btn-sm" href="./index.html">
            <i class="bi bi-grid me-2" aria-hidden="true"></i>Admin
          </a>
        </div>

        <div class="alert d-none" id="admin-alert" role="alert"></div>

        <section class="p-4 rounded-4 border" style="background: var(--bg); border-color: var(--border)">
          <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
            <div>
              <div class="fw-semibold">Filtros</div>
              <div class="text-secondary small">Status e busca</div>
            </div>
            <div class="d-flex flex-wrap gap-2 align-items-center">
              <select class="form-select form-select-sm bg-transparent text-body" style="max-width: 170px" data-admin-filter-status>
                <option value="all">Todos</option>
                <option value="new">Novos</option>
                <option value="contacted">Contactados</option>
                <option value="archived">Arquivados</option>
              </select>
              <input
                class="form-control form-control-sm bg-transparent text-body"
                style="max-width: 240px"
                type="search"
                placeholder="Buscar..."
                data-admin-search
              />
              <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-refresh>
                <i class="bi bi-arrow-clockwise me-2" aria-hidden="true"></i>Atualizar
              </button>
            </div>
          </div>

          <div class="text-secondary small d-none" data-admin-loading>Carregando...</div>
          <div class="text-secondary small d-none" data-admin-empty>Nenhum interesse encontrado.</div>

          <div class="d-flex flex-column gap-2" data-admin-cards></div>
        </section>
      </section>
    </main>

    <div data-include="../components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/components/include.js"></script>
    <script type="module" src="../assets/js/pages/admin/contact-interests.js"></script>
  </body>
</html>
