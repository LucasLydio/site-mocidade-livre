<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Áreas • Mocidade Livre</title>
    <meta name="description" content="Administração de áreas da Mocidade Livre." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/pages/admin.css" />
    <link rel="icon" href="../assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="admin admin-areas">
    <div data-include="../components/layout/header.html"></div>

    <main class="container py-5">
      <section class="admin-shell p-4 p-md-5 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Admin • Áreas</h1>
            <p class="text-secondary mb-0">Crie e gerencie as áreas/ministries do grupo.</p>
          </div>
          <div class="d-flex gap-2">
            <a class="btn btn-outline-secondary btn-sm" href="./index.html">
              <i class="bi bi-grid me-2" aria-hidden="true"></i>Admin
            </a>
            <a class="btn btn-outline-secondary btn-sm" href="../areas.html">
              <i class="bi bi-eye me-2" aria-hidden="true"></i>Ver público
            </a>
          </div>
        </div>

        <div class="alert d-none" id="admin-alert" role="alert"></div>

        <div class="row g-4">
          <div class="col-12 col-lg-5">
            <section class="p-4 rounded-4 border h-100" style="border-color: var(--border)">
              <div class="d-flex align-items-center justify-content-between mb-3">
                <div>
                  <div class="fw-semibold">Área</div>
                  <div class="text-secondary small">Criar ou editar</div>
                </div>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-clear>Limpar</button>
              </div>

              <form id="admin-area-form" novalidate>
                <input type="hidden" name="id" />

                <div class="mb-3">
                  <label class="form-label" for="area-name">Nome</label>
                  <input class="form-control bg-transparent text-body" id="area-name" name="name" type="text" required />
                </div>

                <div class="mb-3">
                  <label class="form-label" for="area-slug">Slug</label>
                  <input class="form-control bg-transparent text-body" id="area-slug" name="slug" type="text" required />
                  <div class="text-secondary small mt-1">Ex: <code>louvor</code>, <code>acolhimento</code>, <code>midia</code></div>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="area-description">Descrição</label>
                  <textarea class="form-control bg-transparent text-body" id="area-description" name="description" rows="3"></textarea>
                </div>

                <div class="mb-3">
                  <label class="form-label" for="area-cover-url">Cover URL (opcional)</label>
                  <input class="form-control bg-transparent text-body" id="area-cover-url" name="cover_image_url" type="url" placeholder="https://..." />
                  <div class="text-secondary small mt-1">Preferir upload abaixo. URL manual é fallback.</div>
                </div>

                <div class="form-check mb-3">
                  <input class="form-check-input" id="area-active" name="is_active" type="checkbox" checked />
                  <label class="form-check-label" for="area-active">Ativa</label>
                </div>

                <div class="d-flex gap-2 mt-3">
                  <button class="btn btn-dark flex-grow-1" type="submit">
                    <i class="bi bi-save me-2" aria-hidden="true"></i>Salvar
                  </button>
                  <button class="btn btn-outline-danger" type="button" data-admin-delete disabled>
                    <i class="bi bi-trash me-2" aria-hidden="true"></i>Excluir
                  </button>
                </div>
              </form>

              <hr class="my-4" />

              <section>
                <div class="fw-semibold mb-2">Capa</div>
                <div class="ratio ratio-16x9 rounded-4 overflow-hidden border mb-3" style="border-color: var(--border)">
                  <img id="area-cover-preview" class="w-100 h-100 object-fit-cover" alt="Capa da área" />
                </div>

                <label class="form-label" for="area-cover-file">Upload de imagem</label>
                <input class="form-control bg-transparent text-body" id="area-cover-file" type="file" accept="image/png,image/jpeg,image/webp,image/svg+xml" />
                <button class="btn btn-outline-secondary w-100 mt-2" type="button" data-admin-upload-cover disabled>
                  <i class="bi bi-upload me-2" aria-hidden="true"></i>Enviar capa
                </button>
              </section>
            </section>
          </div>

          <div class="col-12 col-lg-7">
            <section class="p-4 rounded-4 border h-100" style="border-color: var(--border)">
              <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3">
                <div>
                  <div class="fw-semibold">Áreas</div>
                  <div class="text-secondary small">Ativas e inativas</div>
                </div>
                <div class="d-flex gap-2">
                  <input class="form-control form-control-sm bg-transparent text-body" style="max-width: 220px" type="search" placeholder="Buscar..." data-admin-search />
                  <button class="btn btn-outline-secondary btn-sm" type="button" data-admin-refresh>
                    <i class="bi bi-arrow-clockwise me-2" aria-hidden="true"></i>Atualizar
                  </button>
                </div>
              </div>

              <div class="text-secondary small d-none" data-admin-loading>Carregando...</div>
              <div class="text-secondary small d-none" data-admin-empty>Nenhuma área cadastrada.</div>

              <div class="table-responsive d-none d-md-block">
                <table class="table align-middle mb-0">
                  <thead>
                    <tr>
                      <th>Área</th>
                      <th>Status</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody data-admin-rows></tbody>
                </table>
              </div>

              <div class="d-md-none d-flex flex-column gap-2" data-admin-cards></div>
            </section>
          </div>
        </div>
      </section>
    </main>

    <div data-include="../components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/components/include.js"></script>
    <script type="module" src="../assets/js/pages/admin/areas.js"></script>
  </body>
</html>
