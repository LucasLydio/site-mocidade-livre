<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin • Mocidade Livre</title>
    <meta name="description" content="Painel administrativo da Mocidade Livre." />

    <link href="https://fonts.googleapis.com/css2?family=Delius&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" />
    <link rel="stylesheet" href="../assets/css/main.css" />
    <link rel="stylesheet" href="../assets/css/pages/admin.css" />
    <link rel="icon" href="../assets/images/logo-mocidade.webp" type="image/svg+xml" />
  </head>
  <body class="admin">
    <div data-include="../components/layout/header.html"></div>

    <main class="container py-5">
      <section class="admin-shell p-4 p-md-5 rounded-4 border" style="background: var(--surface); border-color: var(--border)">
        <div class="d-flex flex-wrap align-items-start justify-content-between gap-3 mb-4">
          <div>
            <h1 class="h4 mb-1">Admin</h1>
            <p class="text-secondary mb-0">Escolha o que deseja gerenciar.</p>
          </div>
          <a class="btn btn-outline-secondary btn-sm" href="../index.html">
            <i class="bi bi-house me-2" aria-hidden="true"></i>Voltar ao site
          </a>
        </div>

        <div class="alert d-none" id="admin-alert" role="alert"></div>

        <div class="row g-3" data-admin-cards>
          <div class="col-12 col-md-6 col-lg-3">
            <a class="admin-card p-4 rounded-4 border d-block text-decoration-none" href="./products.html" style="border-color: var(--border)">
              <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-bag" aria-hidden="true"></i>
                <div class="fw-semibold">Produtos</div>
              </div>
              <div class="text-secondary small">Catálogo e imagens da loja.</div>
            </a>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <a class="admin-card p-4 rounded-4 border d-block text-decoration-none" href="./areas.html" style="border-color: var(--border)">
              <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-people" aria-hidden="true"></i>
                <div class="fw-semibold">Áreas</div>
              </div>
              <div class="text-secondary small">Ministérios/áreas para servir.</div>
            </a>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <a class="admin-card p-4 rounded-4 border d-block text-decoration-none" href="./events.html" style="border-color: var(--border)">
              <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-calendar-event" aria-hidden="true"></i>
                <div class="fw-semibold">Eventos</div>
              </div>
              <div class="text-secondary small">Agenda e eventos públicos.</div>
            </a>
          </div>
          <div class="col-12 col-md-6 col-lg-3">
            <a class="admin-card p-4 rounded-4 border d-block text-decoration-none" href="./contact-interests.html" style="border-color: var(--border)">
              <div class="d-flex align-items-center gap-2 mb-2">
                <i class="bi bi-chat-dots" aria-hidden="true"></i>
                <div class="fw-semibold">Interesses</div>
              </div>
              <div class="text-secondary small">Pessoas que pediram contato.</div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <div data-include="../components/layout/footer.html"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../assets/js/components/include.js"></script>
    <script type="module" src="../assets/js/pages/admin/index.js"></script>
  </body>
</html>
